<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>水耕栽培 作業管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0c160c; }
  #root { min-height: 100vh; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  button { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Google Apps Script エンドポイント ─────────────────────────────────────
const GAS_URL = "https://script.google.com/macros/s/AKfycbzLzgL1f9f-2jRoqeOrcce4GVsTsSbFfmmpu36Mfm_Xiz_SR1vouwP3XQ3hTgQ0_jIXZA/exec";

// JSONP方式でGASと通信（CORSを回避）
function gasCall(payload) {
  return new Promise((resolve, reject) => {
    const cbName = "cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    const timer = setTimeout(() => { cleanup(); reject(new Error("timeout")); }, 20000);
    window[cbName] = (data) => { cleanup(); resolve(data); };
    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      const el = document.getElementById(cbName);
      if (el) el.remove();
    }
    const s = document.createElement("script");
    s.id = cbName;
    s.onerror = () => { cleanup(); reject(new Error("network")); };
    s.src = GAS_URL + "?callback=" + cbName + "&payload=" + encodeURIComponent(JSON.stringify(payload));
    document.head.appendChild(s);
  });
}

// ── マスターデータ ────────────────────────────────────────────────────────
const BUILDINGS = {
  "C棟": {
    A: Array.from({length:8},(_,i)=>`C棟-A${i+1}`),
    B: Array.from({length:8},(_,i)=>`C棟-B${i+1}`),
    C: Array.from({length:8},(_,i)=>`C棟-C${i+1}`),
  },
  "D棟": {
    A: Array.from({length:3},(_,i)=>`D棟-A${i+1}`),
    B: Array.from({length:3},(_,i)=>`D棟-B${i+1}`),
  },
};
const CROPS = ["ルッコラ","ホワイトセロリ","サラダホウレンソウ","ミズナ"];
const TASKS = ["収穫","定植","収穫後片付け","収穫後の洗い","定植前ベッド作成"];
const TASK_QUANTITY = {
  収穫: {unit:"ケース", label:"収穫ケース数"},
  定植: {unit:"パネル", label:"定植パネル数"},
};
const DEFAULT_WORKERS = [
  "山下　拓磨","高橋　龍一","山田　和樹","樋口　優",
  "KC GANGA RAM","FAJAR ANDRE MULYANA","RANA SAGAR","AN TONI","FARIQ ALBANNA",
  "我妻　洋子","佐藤　ひろ子","中島　れい子","畠山　えみ子","中村　はるみ",
  "佐々木　英昭","庄司　勇",
].map((name,i) => ({id:`default_${i}`, name}));

// ── テーマ ────────────────────────────────────────────────────────────────
const C = {
  bg:"#0c160c", surface:"#141f14", card:"#1a281a", border:"#253525",
  primary:"#5dde4a", primaryDark:"#3ca82a", primaryDim:"#3ca82a22",
  text:"#e0f0e0", muted:"#6a9a6a", accent:"#a0e090",
  danger:"#f04060", dangerDim:"#f0406022", warn:"#ffc840",
  mono:'"JetBrains Mono","Courier New",monospace',
  sans:'"Noto Sans JP","Hiragino Sans","Yu Gothic UI",sans-serif',
};

// ── localStorage ─────────────────────────────────────────────────────────
const ls = {
  get: (k) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch{return null;} },
  set: (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch{} },
};

// ── ユーティリティ ────────────────────────────────────────────────────────
const fmt = (s) => {
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), ss=s%60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
};
const fmtDur = (s) => {
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
  if(h>0) return `${h}時間${m}分`;
  if(m>0) return `${m}分`;
  return `${s}秒`;
};
const fmtDate = (ts) =>
  new Date(ts).toLocaleDateString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});

// ── 共通UI ────────────────────────────────────────────────────────────────
const Btn = ({children, onClick, style={}, disabled}) => (
  <button onClick={onClick} disabled={disabled}
    style={{cursor:disabled?"not-allowed":"pointer", fontFamily:C.sans, border:"none", ...style}}>
    {children}
  </button>
);

const TopBar = ({onBack, title, right}) => (
  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
    padding:"13px 16px",borderBottom:`1px solid ${C.border}`,
    background:C.surface,position:"sticky",top:0,zIndex:10}}>
    <Btn onClick={onBack} style={{background:"none",color:C.primary,fontSize:15,padding:"4px 8px",minWidth:50}}>
      ← 戻る
    </Btn>
    <span style={{fontSize:15,fontWeight:700,color:C.text}}>{title}</span>
    <div style={{minWidth:50,display:"flex",justifyContent:"flex-end"}}>{right||null}</div>
  </div>
);

const SyncBadge = ({status}) => {
  const map = {
    syncing: [C.warn,    "⟳ スプレッドシートに送信中..."],
    ok:      [C.primary, "✓ スプレッドシートに保存しました"],
    error:   [C.danger,  "✗ オフライン保存（接続回復後に自動送信）"],
  };
  const v = map[status];
  if (!v) return null;
  return (
    <div style={{textAlign:"center",padding:"7px 12px",fontSize:12,fontWeight:700,
      color:v[0],borderBottom:`1px solid ${C.border}`,background:C.surface}}>
      {v[1]}
    </div>
  );
};

// ════════════════════════════════════════════════════════════════════════════
//  App
// ════════════════════════════════════════════════════════════════════════════
function App() {
  const [screen,    setScreen]    = useState("loading");
  const [workers,   setWorkers]   = useState([]);
  const [records,   setRecords]   = useState([]);
  const [current,   setCurrent]   = useState(null);   // 選択中の担当者
  const [activeTask,setActive]    = useState(null);   // 進行中の作業
  const [setup,     setSetup]     = useState({zone:"",crop:"",task:""});
  const [elapsed,   setElapsed]   = useState(0);
  const [endSnap,   setEndSnap]   = useState(0);
  const [endTime,   setEndTime]   = useState(0);
  const [quantity,  setQty]       = useState("");
  const [adding,    setAdding]    = useState(false);
  const [newName,   setNewName]   = useState("");
  const [editMode,  setEditMode]  = useState(false);
  const [delTarget, setDelTarget] = useState(null);
  const [aTab,      setATab]      = useState("worker");
  const [syncSt,    setSyncSt]    = useState("idle"); // idle|syncing|ok|error
  const [pending,   setPending]   = useState([]);     // 未送信バッファ
  const timerRef = useRef(null);

  // ── 初期ロード ────────────────────────────────────────────────────────
  useEffect(() => {
    // まずキャッシュを即表示
    const cachedW = ls.get("suiko_workers");
    const cachedR = ls.get("suiko_records") || [];
    const cachedA = ls.get("suiko_active");
    const cachedP = ls.get("suiko_pending") || [];
    setWorkers(cachedW || DEFAULT_WORKERS);
    if (!cachedW) ls.set("suiko_workers", DEFAULT_WORKERS);
    setRecords(cachedR);
    setActive(cachedA);
    setPending(cachedP);
    setScreen("workers");

    // バックグラウンドでGASから最新を取得
    syncFromGAS();
  }, []);

  const syncFromGAS = async () => {
    try {
      const [wRes, rRes] = await Promise.all([
        gasCall({action:"getWorkers"}),
        gasCall({action:"getRecords"}),
      ]);
      if (wRes?.workers?.length > 0) {
        setWorkers(wRes.workers);
        ls.set("suiko_workers", wRes.workers);
      }
      if (rRes?.records) {
        const converted = rRes.records.map(r => ({
          id:           String(r.id || ""),
          workerId:     String(r.workerId || ""),
          workerName:   String(r.workerName || ""),
          zone:         String(r.zone || ""),
          crop:         String(r.crop || ""),
          task:         String(r.task || ""),
          startTime:    r.startTime ? new Date(r.startTime).getTime() : 0,
          endTime:      r.endTime   ? new Date(r.endTime).getTime()   : 0,
          duration:     Number(r.duration) || 0,
          quantity:     (r.quantity !== "" && r.quantity != null) ? Number(r.quantity) : null,
          quantityUnit: r.quantityUnit || null,
        }));
        setRecords(converted);
        ls.set("suiko_records", converted);
      }
    } catch(e) {
      console.warn("GAS sync failed:", e);
    }
  };

  // ── タイマー ──────────────────────────────────────────────────────────
  useEffect(() => {
    if (screen === "activeTask" && activeTask) {
      setElapsed(Math.floor((Date.now() - activeTask.startTime) / 1000));
      timerRef.current = setInterval(() => setElapsed(s => s+1), 1000);
      return () => clearInterval(timerRef.current);
    }
  }, [screen, activeTask]);

  // ── 担当者追加 ────────────────────────────────────────────────────────
  const addWorker = async () => {
    if (!newName.trim()) return;
    const w = {id: Date.now().toString(), name: newName.trim()};
    const updated = [...workers, w];
    setWorkers(updated); ls.set("suiko_workers", updated);
    setNewName(""); setAdding(false);
    try { await gasCall({action:"saveWorkers", workers:updated}); }
    catch(e) { console.warn("saveWorkers failed", e); }
  };

  // ── 担当者削除 ────────────────────────────────────────────────────────
  const deleteWorker = async (id) => {
    const updated = workers.filter(w => w.id !== id);
    setWorkers(updated); ls.set("suiko_workers", updated);
    setDelTarget(null);
    try { await gasCall({action:"saveWorkers", workers:updated}); }
    catch(e) { console.warn("deleteWorker failed", e); }
  };

  const selectWorker = (w) => {
    setCurrent(w);
    setScreen(activeTask?.workerId === w.id ? "activeTask" : "dashboard");
  };

  // ── 作業開始 ──────────────────────────────────────────────────────────
  const startTask = () => {
    const task = {workerId:current.id, workerName:current.name, ...setup, startTime:Date.now()};
    setActive(task); ls.set("suiko_active", task);
    setElapsed(0); setScreen("activeTask");
  };

  // ── 作業終了（終了画面へ） ────────────────────────────────────────────
  const endTask = () => {
    clearInterval(timerRef.current);
    setEndSnap(elapsed);
    setEndTime(Date.now()); // ← 終了ボタンを押した瞬間の時刻を確定
    setScreen("endTask");
  };

  // ── 記録保存 + GAS送信 ────────────────────────────────────────────────
  const saveRecord = async () => {
    const duration = Math.floor((endTime - activeTask.startTime) / 1000);
    const rec = {
      id: Date.now().toString(),
      ...activeTask, endTime, duration,
      quantity: quantity ? Number(quantity) : null,
      quantityUnit: TASK_QUANTITY[activeTask.task]?.unit || null,
    };

    // ローカル即反映
    const updRec = [...records, rec];
    setRecords(updRec); ls.set("suiko_records", updRec);
    ls.set("suiko_active", null); setActive(null);
    setQty(""); setSetup({zone:"",crop:"",task:""});
    setScreen("dashboard");
    setSyncSt("syncing");

    // GASへ送信
    try {
      await gasCall({action:"addRecord", record:rec});
      setSyncSt("ok");
      setTimeout(() => setSyncSt("idle"), 4000);

      // 未送信バッファの再送
      const buf = ls.get("suiko_pending") || [];
      for (const p of buf) {
        try { await gasCall({action:"addRecord", record:p}); } catch{}
      }
      if (buf.length > 0) { ls.set("suiko_pending",[]); setPending([]); }

    } catch(e) {
      // オフライン時はバッファへ
      const buf = [...(ls.get("suiko_pending")||[]), rec];
      ls.set("suiko_pending", buf); setPending(buf);
      setSyncSt("error");
      setTimeout(() => setSyncSt("idle"), 6000);
    }
  };

  // ── 分析データ ─────────────────────────────────────────────────────────
  const workerStats = workers.map(w => {
    const harvests = records.filter(r => r.workerId===w.id && r.task==="収穫" && r.quantity);
    const cases    = harvests.reduce((s,r) => s+r.quantity, 0);
    const hours    = harvests.reduce((s,r) => s+r.duration/3600, 0);
    const all      = records.filter(r => r.workerId===w.id);
    return {
      id:w.id, name:w.name,
      totalCases: cases, totalHours: Math.round(hours*10)/10,
      casesPerHour: hours>0 ? Math.round((cases/hours)*10)/10 : 0,
      harvestCount: harvests.length,
      totalTime: all.reduce((s,r) => s+r.duration, 0),
      taskCount: all.length,
    };
  });
  const maxCPH = Math.max(...workerStats.map(w => w.casesPerHour), 1);

  const zoneStats = {};
  records.forEach(r => {
    if (!zoneStats[r.zone]) zoneStats[r.zone] = {};
    if (!zoneStats[r.zone][r.task]) zoneStats[r.zone][r.task] = {duration:0, count:0};
    zoneStats[r.zone][r.task].duration += r.duration;
    zoneStats[r.zone][r.task].count    += 1;
  });

  const appStyle = {
    background:C.bg, minHeight:"100vh", fontFamily:C.sans,
    color:C.text, maxWidth:480, margin:"0 auto",
  };

  // ══════════════════════════════════════════════════════════════════════
  //  SCREEN: loading
  // ══════════════════════════════════════════════════════════════════════
  if (screen==="loading")
    return (
      <div style={{...appStyle,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{color:C.primary,fontSize:18}}>🌱 読み込み中...</span>
      </div>
    );

  // ══════════════════════════════════════════════════════════════════════
  //  SCREEN: workers（担当者選択）
  // ══════════════════════════════════════════════════════════════════════
  if (screen==="workers")
    return (
      <div style={appStyle}>
        {/* ヘッダー */}
        <div style={{padding:"28px 20px 20px",textAlign:"center",
          borderBottom:`1px solid ${C.border}`,background:C.surface}}>
          <div style={{fontSize:46,marginBottom:8}}>🌱</div>
          <h1 style={{margin:0,fontSize:21,fontWeight:700,color:C.primary,letterSpacing:2}}>
            水耕栽培 作業管理
          </h1>
          <p style={{margin:"8px 0 0",fontSize:13,color:C.muted}}>担当者を選択してください</p>
          {pending.length > 0 &&
            <div style={{marginTop:10,fontSize:12,color:C.warn,background:"#ffc84018",
              borderRadius:8,padding:"6px 14px",display:"inline-block"}}>
              ⚠ 未送信の記録が {pending.length} 件あります
            </div>
          }
        </div>

        {/* 削除確認モーダル */}
        {delTarget && (() => {
          const t = workers.find(w => w.id===delTarget);
          return (
            <div style={{position:"fixed",inset:0,background:"#000a",zIndex:100,
              display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
              <div style={{background:C.card,border:`1px solid ${C.danger}`,
                borderRadius:18,padding:28,width:"100%",maxWidth:340,textAlign:"center"}}>
                <div style={{fontSize:36,marginBottom:12}}>🗑️</div>
                <div style={{fontWeight:700,fontSize:17,marginBottom:8,color:C.text}}>{t?.name}</div>
                <div style={{fontSize:13,color:C.muted,marginBottom:24}}>
                  このメンバーを削除しますか？<br/>作業記録は残ります。
                </div>
                <div style={{display:"flex",gap:12}}>
                  <Btn onClick={()=>setDelTarget(null)}
                    style={{flex:1,background:"none",border:`1px solid ${C.border}`,
                      borderRadius:10,color:C.muted,padding:13,fontSize:14}}>
                    キャンセル
                  </Btn>
                  <Btn onClick={()=>deleteWorker(delTarget)}
                    style={{flex:1,background:C.danger,borderRadius:10,
                      color:"#fff",padding:13,fontSize:14,fontWeight:700}}>
                    削除する
                  </Btn>
                </div>
              </div>
            </div>
          );
        })()}

        <div style={{padding:"16px 20px"}}>
          {/* 編集ボタン */}
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
            <Btn onClick={()=>setEditMode(m=>!m)}
              style={{background:editMode?C.primaryDim:"none",
                border:`1px solid ${editMode?C.primary:C.border}`,
                borderRadius:8,color:editMode?C.primary:C.muted,
                padding:"7px 16px",fontSize:13,fontWeight:700}}>
              {editMode ? "✓ 完了" : "✏️ 編集"}
            </Btn>
          </div>

          {/* メンバー一覧 */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {workers.map(w => (
              <div key={w.id} style={{position:"relative"}}>
                <Btn onClick={()=>{ if(!editMode) selectWorker(w); }}
                  style={{width:"100%",
                    background: activeTask?.workerId===w.id ? C.primaryDim : C.card,
                    border:`2px solid ${activeTask?.workerId===w.id ? C.primary : C.border}`,
                    borderRadius:14, padding:"18px 10px", color:C.text,
                    display:"flex",flexDirection:"column",alignItems:"center",gap:6,
                    cursor: editMode?"default":"pointer", opacity:editMode?0.7:1}}>
                  <span style={{fontSize:26}}>👤</span>
                  <span style={{fontSize:13,fontWeight:700,textAlign:"center",lineHeight:1.4}}>
                    {w.name}
                  </span>
                  {activeTask?.workerId===w.id && !editMode &&
                    <span style={{fontSize:10,background:C.primary,color:"#000",
                      borderRadius:10,padding:"2px 8px",fontWeight:700}}>作業中</span>}
                </Btn>
                {editMode &&
                  <button onClick={()=>setDelTarget(w.id)}
                    style={{position:"absolute",top:-7,right:-7,width:26,height:26,
                      borderRadius:"50%",background:C.danger,border:`2px solid ${C.bg}`,
                      color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontFamily:C.sans,lineHeight:1}}>
                    ×
                  </button>
                }
              </div>
            ))}
          </div>

          {/* 担当者追加 */}
          {adding ? (
            <div style={{background:C.card,border:`1px solid ${C.border}`,
              borderRadius:14,padding:16,marginBottom:14}}>
              <input
                style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,
                  borderRadius:8,padding:"14px 16px",color:C.text,fontSize:16,
                  fontFamily:C.sans,outline:"none",marginBottom:12}}
                value={newName} onChange={e=>setNewName(e.target.value)}
                placeholder="名前を入力..." autoFocus
                onKeyDown={e=>e.key==="Enter"&&addWorker()}/>
              <div style={{display:"flex",gap:10}}>
                <Btn onClick={()=>{setAdding(false);setNewName("");}}
                  style={{flex:1,background:"none",border:`1px solid ${C.border}`,
                    borderRadius:8,color:C.muted,padding:10,fontSize:14}}>
                  キャンセル
                </Btn>
                <Btn onClick={addWorker}
                  style={{flex:2,background:C.primary,borderRadius:8,
                    color:"#000",padding:10,fontSize:14,fontWeight:700}}>
                  追加
                </Btn>
              </div>
            </div>
          ) : (
            <Btn onClick={()=>{setAdding(true);setEditMode(false);}}
              style={{width:"100%",background:"none",border:`2px dashed ${C.border}`,
                borderRadius:14,padding:16,color:C.muted,fontSize:14,
                display:"flex",alignItems:"center",justifyContent:"center",
                gap:8,marginBottom:14}}>
              <span style={{fontSize:18}}>＋</span> 新しいメンバーを追加
            </Btn>
          )}

          {records.length > 0 &&
            <Btn onClick={()=>setScreen("analytics")}
              style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,
                borderRadius:10,padding:14,color:C.text,fontSize:14,
                display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              📊 記録・分析を見る
            </Btn>
          }
        </div>
      </div>
    );

  // ══════════════════════════════════════════════════════════════════════
  //  SCREEN: dashboard
  // ══════════════════════════════════════════════════════════════════════
  if (screen==="dashboard") {
    const myRec    = records.filter(r=>r.workerId===current.id).slice(-6).reverse();
    const myActive = activeTask?.workerId===current.id ? activeTask : null;
    return (
      <div style={appStyle}>
        <TopBar onBack={()=>setScreen("workers")} title={current.name}
          right={
            <Btn onClick={()=>setScreen("analytics")}
              style={{background:"none",color:C.primary,fontSize:20}}>📊</Btn>
          }/>
        <SyncBadge status={syncSt}/>
        <div style={{padding:16}}>
          {myActive ? (
            <div style={{background:C.card,border:`2px solid ${C.primary}`,
              borderRadius:14,padding:18,marginBottom:20}}>
              <div style={{fontSize:12,color:C.primary,fontWeight:700,marginBottom:8,letterSpacing:1}}>
                ⚡ 作業中
              </div>
              <div style={{fontSize:17,fontWeight:700,marginBottom:4}}>{myActive.task}</div>
              <div style={{fontSize:13,color:C.muted,marginBottom:14}}>
                {myActive.zone} · {myActive.crop}
              </div>
              <Btn onClick={()=>setScreen("activeTask")}
                style={{width:"100%",background:C.primary,borderRadius:8,
                  padding:12,color:"#000",fontWeight:700,fontSize:15}}>
                作業に戻る →
              </Btn>
            </div>
          ) : (
            <Btn onClick={()=>setScreen("newTask")}
              style={{width:"100%",
                background:`linear-gradient(135deg,${C.primary},${C.primaryDark})`,
                borderRadius:18,padding:"32px 20px",color:"#000",marginBottom:20,
                display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
              <span style={{fontSize:44}}>▶</span>
              <span style={{fontSize:19,fontWeight:800,letterSpacing:2}}>新しい作業を開始</span>
            </Btn>
          )}
          <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:12}}>
            最近の作業
          </div>
          {myRec.length===0
            ? <p style={{color:C.muted,fontSize:14,textAlign:"center",padding:"30px 0"}}>まだ記録がありません</p>
            : myRec.map(r => (
              <div key={r.id} style={{background:C.card,border:`1px solid ${C.border}`,
                borderRadius:12,padding:14,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",
                  alignItems:"flex-start",marginBottom:5}}>
                  <span style={{fontWeight:700,fontSize:14}}>{r.task}</span>
                  <span style={{fontFamily:C.mono,fontSize:14,color:C.primary}}>
                    {fmtDur(r.duration)}
                  </span>
                </div>
                <div style={{fontSize:13,color:C.muted}}>
                  {r.zone} · {r.crop}{r.quantity ? ` · ${r.quantity}${r.quantityUnit}` : ""}
                </div>
                <div style={{fontSize:11,marginTop:4,color:"#4a6a4a"}}>{fmtDate(r.startTime)}</div>
              </div>
            ))
          }
        </div>
      </div>
    );
  }

  // ══════════════════════════════════════════════════════════════════════
  //  SCREEN: newTask（作業設定）
  // ══════════════════════════════════════════════════════════════════════
  if (screen==="newTask") {
    const canStart = setup.zone && setup.crop && setup.task;
    return (
      <div style={appStyle}>
        <TopBar onBack={()=>setScreen("dashboard")} title="新しい作業"/>
        <div style={{padding:16}}>

          {/* 工区 */}
          <div style={{marginBottom:24}}>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:12}}>
              🏭 工区を選択
            </div>
            {Object.entries(BUILDINGS).map(([bldg,rows]) => (
              <div key={bldg} style={{marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:8,paddingLeft:4}}>
                  {bldg}
                </div>
                {Object.entries(rows).map(([row,zones]) => (
                  <div key={row} style={{display:"flex",alignItems:"center",
                    gap:6,marginBottom:6,flexWrap:"wrap"}}>
                    <span style={{fontSize:11,color:C.muted,width:20,
                      flexShrink:0,textAlign:"center"}}>{row}</span>
                    {zones.map(z => (
                      <Btn key={z} onClick={()=>setSetup({...setup,zone:z})}
                        style={{
                          background: setup.zone===z ? C.primary : C.card,
                          border:`1px solid ${setup.zone===z ? C.primary : C.border}`,
                          borderRadius:7,padding:"9px 8px",
                          color: setup.zone===z ? "#000" : C.text,
                          fontSize:12,fontWeight:setup.zone===z?700:400,minWidth:38}}>
                        {z.split("-")[1]}
                      </Btn>
                    ))}
                  </div>
                ))}
              </div>
            ))}
            {setup.zone &&
              <div style={{fontSize:13,color:C.primary,fontWeight:700,marginTop:4}}>✓ {setup.zone}</div>}
          </div>

          {/* 作物 */}
          <div style={{marginBottom:24}}>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:12}}>
              🌿 作物を選択
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {CROPS.map(c => (
                <Btn key={c} onClick={()=>setSetup({...setup,crop:c})}
                  style={{
                    background: setup.crop===c ? C.primary : C.card,
                    border:`1px solid ${setup.crop===c ? C.primary : C.border}`,
                    borderRadius:10,padding:"15px 10px",
                    color: setup.crop===c ? "#000" : C.text,
                    fontWeight:setup.crop===c?700:400,fontSize:14}}>
                  {c}
                </Btn>
              ))}
            </div>
          </div>

          {/* 作業 */}
          <div style={{marginBottom:24}}>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:12}}>
              ⚙️ 作業を選択
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {TASKS.map(t => {
                const icon = t==="収穫"?"🌾":t==="定植"?"🪴":t==="収穫後片付け"?"🧹":t==="収穫後の洗い"?"🚿":"🛏️";
                return (
                  <Btn key={t} onClick={()=>setSetup({...setup,task:t})}
                    style={{
                      background: setup.task===t ? C.primary : C.card,
                      border:`1px solid ${setup.task===t ? C.primary : C.border}`,
                      borderRadius:10,padding:"16px 16px",
                      color: setup.task===t ? "#000" : C.text,
                      fontWeight:setup.task===t?700:400,fontSize:15,
                      textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
                    {icon} {t}
                    {TASK_QUANTITY[t] &&
                      <span style={{marginLeft:"auto",fontSize:11,opacity:0.7}}>
                        {TASK_QUANTITY[t].unit}数入力あり
                      </span>}
                  </Btn>
                );
              })}
            </div>
          </div>

          {canStart && (
            <div style={{background:C.card,border:`2px solid ${C.primary}`,borderRadius:14,padding:16}}>
              <div style={{fontSize:13,color:C.muted,textAlign:"center",marginBottom:14}}>
                <span style={{color:C.accent}}>{setup.zone}</span> ·{" "}
                <span style={{color:C.accent}}>{setup.crop}</span> ·{" "}
                <span style={{color:C.accent}}>{setup.task}</span>
              </div>
              <Btn onClick={startTask}
                style={{width:"100%",
                  background:`linear-gradient(135deg,${C.primary},${C.primaryDark})`,
                  borderRadius:10,padding:18,color:"#000",fontWeight:800,fontSize:19,
                  display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
                ▶ スタート
              </Btn>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ══════════════════════════════════════════════════════════════════════
  //  SCREEN: activeTask（タイマー）
  // ══════════════════════════════════════════════════════════════════════
  if (screen==="activeTask")
    return (
      <div style={{...appStyle,display:"flex",flexDirection:"column"}}>
        <TopBar onBack={()=>setScreen("dashboard")} title={current?.name}/>
        <div style={{flex:1,display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",padding:32}}>
          <div style={{textAlign:"center",marginBottom:40}}>
            <div style={{fontSize:44,marginBottom:14}}>
              {activeTask?.task==="収穫"?"🌾":activeTask?.task==="定植"?"🪴":
               activeTask?.task==="収穫後片付け"?"🧹":activeTask?.task==="収穫後の洗い"?"🚿":"🛏️"}
            </div>
            <div style={{fontSize:24,fontWeight:800,color:C.primary,
              marginBottom:6,letterSpacing:1}}>{activeTask?.task}</div>
            <div style={{fontSize:16,color:C.accent,marginBottom:2}}>{activeTask?.zone}</div>
            <div style={{fontSize:14,color:C.muted}}>{activeTask?.crop}</div>
          </div>
          <div style={{fontFamily:C.mono,fontSize:58,fontWeight:700,color:C.text,
            background:C.card,borderRadius:20,padding:"24px 36px",
            border:`2px solid ${C.primary}`,letterSpacing:4,
            boxShadow:`0 0 50px ${C.primary}18`,marginBottom:14,lineHeight:1}}>
            {fmt(elapsed)}
          </div>
          <div style={{fontSize:13,color:C.muted,marginBottom:50}}>
            開始: {activeTask
              ? new Date(activeTask.startTime).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})
              : ""}
          </div>
          <Btn onClick={endTask}
            style={{width:"100%",maxWidth:320,background:C.danger,borderRadius:18,
              padding:"22px 20px",color:"#fff",fontWeight:800,fontSize:21,
              display:"flex",alignItems:"center",justifyContent:"center",gap:12,
              boxShadow:`0 6px 24px ${C.dangerDim}`}}>
            ⏹ 終了
          </Btn>
        </div>
      </div>
    );

  // ══════════════════════════════════════════════════════════════════════
  //  SCREEN: endTask（数量入力）
  // ══════════════════════════════════════════════════════════════════════
  if (screen==="endTask") {
    const needsQty = TASK_QUANTITY[activeTask?.task];
    const canSave  = !needsQty || quantity;
    return (
      <div style={appStyle}>
        <TopBar onBack={()=>setScreen("activeTask")} title="作業完了"/>
        <div style={{padding:20,display:"flex",flexDirection:"column",
          alignItems:"center",paddingTop:36}}>
          <div style={{fontSize:70,marginBottom:24}}>✅</div>
          <div style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,
            borderRadius:16,padding:20,textAlign:"center",marginBottom:28}}>
            <div style={{fontSize:21,fontWeight:800,color:C.primary,marginBottom:6}}>
              {activeTask?.task}
            </div>
            <div style={{fontSize:14,color:C.muted,marginBottom:20}}>
              {activeTask?.zone} · {activeTask?.crop}
            </div>
            <div style={{fontFamily:C.mono,fontSize:44,fontWeight:700,
              color:C.text,letterSpacing:3}}>{fmt(endSnap)}</div>
            <div style={{fontSize:13,color:C.muted,marginTop:6}}>{fmtDur(endSnap)}</div>
          </div>
          {needsQty && (
            <div style={{width:"100%",marginBottom:28}}>
              <div style={{fontSize:15,fontWeight:700,color:C.text,
                marginBottom:14,textAlign:"center"}}>
                {needsQty.label}を入力してください
              </div>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <input type="number" min="0" value={quantity}
                  onChange={e=>setQty(e.target.value)} placeholder="0"
                  style={{flex:1,background:C.card,
                    border:`2px solid ${quantity?C.primary:C.border}`,
                    borderRadius:14,padding:"18px 20px",color:C.text,
                    fontSize:32,fontFamily:C.mono,outline:"none",textAlign:"right"}}/>
                <span style={{fontSize:20,fontWeight:700,color:C.muted}}>{needsQty.unit}</span>
              </div>
            </div>
          )}
          <Btn onClick={saveRecord} disabled={!canSave}
            style={{width:"100%",
              background: canSave
                ? `linear-gradient(135deg,${C.primary},${C.primaryDark})`
                : C.border,
              borderRadius:14,padding:18,
              color:canSave?"#000":C.muted,fontWeight:800,fontSize:18}}>
            💾 保存して完了
          </Btn>
        </div>
      </div>
    );
  }

  // ══════════════════════════════════════════════════════════════════════
  //  SCREEN: analytics（分析）
  // ══════════════════════════════════════════════════════════════════════
  if (screen==="analytics") {
    const medal = i => i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`;
    return (
      <div style={appStyle}>
        <TopBar onBack={()=>setScreen(current?"dashboard":"workers")} title="記録・分析"
          right={
            <Btn onClick={syncFromGAS}
              style={{background:"none",color:C.primary,fontSize:12,padding:"5px 10px",
                border:`1px solid ${C.border}`,borderRadius:6}}>
              ↻ 更新
            </Btn>
          }/>
        <div style={{display:"flex",borderBottom:`1px solid ${C.border}`}}>
          {[["worker","👤 担当者別"],["zone","🏭 工区別"],["log","📋 ログ"]].map(([k,l]) => (
            <Btn key={k} onClick={()=>setATab(k)}
              style={{flex:1,padding:"12px 4px",
                background:aTab===k?C.surface:"none",
                borderBottom:`2px solid ${aTab===k?C.primary:"transparent"}`,
                color:aTab===k?C.primary:C.muted,fontSize:12,fontWeight:700}}>
              {l}
            </Btn>
          ))}
        </div>
        <div style={{padding:16}}>

          {/* 担当者別 */}
          {aTab==="worker" && <>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:12}}>
              収穫スピード比較
            </div>
            {!workerStats.some(w=>w.harvestCount>0)
              ? <p style={{color:C.muted,textAlign:"center",padding:"40px 0"}}>収穫データがまだありません</p>
              : workerStats.filter(w=>w.harvestCount>0)
                  .sort((a,b)=>b.casesPerHour-a.casesPerHour)
                  .map((w,i) => (
                <div key={w.id} style={{background:C.card,border:`1px solid ${C.border}`,
                  borderRadius:12,padding:16,marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",
                    alignItems:"center",marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:20}}>{medal(i)}</span>
                      <span style={{fontWeight:700,fontSize:16}}>{w.name}</span>
                    </div>
                    <div>
                      <span style={{fontFamily:C.mono,fontSize:24,fontWeight:700,color:C.primary}}>
                        {w.casesPerHour}
                      </span>
                      <span style={{fontSize:12,color:C.muted,marginLeft:4}}>ケース/時</span>
                    </div>
                  </div>
                  <div style={{background:C.surface,borderRadius:6,height:8,
                    marginBottom:8,overflow:"hidden"}}>
                    <div style={{background:C.primary,height:"100%",borderRadius:6,
                      width:`${(w.casesPerHour/maxCPH)*100}%`}}/>
                  </div>
                  <div style={{fontSize:12,color:C.muted}}>
                    合計 {w.totalCases}ケース · {w.totalHours}時間 · {w.harvestCount}回
                  </div>
                </div>
              ))
            }
            <div style={{marginTop:24}}>
              <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:12}}>
                総作業時間
              </div>
              {workerStats.filter(w=>w.taskCount>0)
                .sort((a,b)=>b.totalTime-a.totalTime)
                .map(w => (
                <div key={w.id} style={{background:C.card,border:`1px solid ${C.border}`,
                  borderRadius:12,padding:14,marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontWeight:700}}>{w.name}</span>
                    <span style={{fontFamily:C.mono,color:C.accent}}>{fmtDur(w.totalTime)}</span>
                  </div>
                  <div style={{fontSize:12,color:C.muted,marginTop:4}}>{w.taskCount}件の作業</div>
                </div>
              ))}
            </div>
          </>}

          {/* 工区別 */}
          {aTab==="zone" && <>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:12}}>
              工区別作業時間
            </div>
            {Object.keys(zoneStats).length===0
              ? <p style={{color:C.muted,textAlign:"center",padding:"40px 0"}}>データがまだありません</p>
              : Object.entries(zoneStats)
                  .sort((a,b) => {
                    const tA=Object.values(a[1]).reduce((s,v)=>s+v.duration,0);
                    const tB=Object.values(b[1]).reduce((s,v)=>s+v.duration,0);
                    return tB-tA;
                  })
                  .map(([zone,tasks]) => {
                    const total=Object.values(tasks).reduce((s,v)=>s+v.duration,0);
                    return (
                      <div key={zone} style={{background:C.card,border:`1px solid ${C.border}`,
                        borderRadius:12,padding:14,marginBottom:10}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                          <span style={{fontWeight:700,fontSize:15}}>{zone}</span>
                          <span style={{fontFamily:C.mono,color:C.accent}}>{fmtDur(total)}</span>
                        </div>
                        {Object.entries(tasks).map(([task,data]) => (
                          <div key={task} style={{display:"flex",justifyContent:"space-between",
                            alignItems:"center",padding:"7px 0",borderTop:`1px solid ${C.border}`}}>
                            <span style={{fontSize:13,color:C.muted}}>{task}</span>
                            <div style={{display:"flex",gap:14,alignItems:"center"}}>
                              <span style={{fontSize:11,color:"#4a6a4a"}}>{data.count}回</span>
                              <span style={{fontFamily:C.mono,fontSize:13}}>{fmtDur(data.duration)}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    );
                  })
            }
          </>}

          {/* ログ */}
          {aTab==="log" && <>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:12}}>
              作業ログ（新しい順）
            </div>
            {records.length===0
              ? <p style={{color:C.muted,textAlign:"center",padding:"40px 0"}}>記録がまだありません</p>
              : [...records].reverse().map(r => (
                <div key={r.id} style={{background:C.card,border:`1px solid ${C.border}`,
                  borderRadius:12,padding:14,marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontWeight:700}}>{r.workerName}</span>
                    <span style={{fontSize:12,color:C.muted}}>{fmtDate(r.startTime)}</span>
                  </div>
                  <div style={{fontSize:13,color:C.accent,marginBottom:4}}>{r.task}</div>
                  <div style={{fontSize:13,color:C.muted}}>{r.zone} · {r.crop}</div>
                  <div style={{display:"flex",gap:14,marginTop:8}}>
                    <span style={{fontFamily:C.mono,fontSize:13,color:C.primary}}>
                      {fmtDur(r.duration)}
                    </span>
                    {r.quantity &&
                      <span style={{fontSize:13,color:C.accent}}>
                        {r.quantity} {r.quantityUnit}
                      </span>}
                  </div>
                </div>
              ))
            }
          </>}
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
